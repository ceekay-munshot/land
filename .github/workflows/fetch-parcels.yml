name: fetch-parcels

# Pull real GBN/Jewar parcels from UP Bhu-Naksha (free US runner) and commit the
# combined GeoJSON back to main so the map renders live land data.
on:
  workflow_dispatch:
    inputs:
      tehsil:
        description: Tehsil (Hindi substring)
        default: जेवर
      max_villages:
        description: Max villages to fetch this run
        default: '12'
      start_village:
        description: Village index to start from (for resuming)
        default: '0'
      include_owners:
        description: Include owner names (1=yes). Repo is public — keep 0 unless private.
        default: '0'
  push:
    paths:
      - '.github/workflows/fetch-parcels.yml'
      - 'tools/fetch_gbn_parcels.py'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pyproj
      - name: Fetch GBN parcels
        env:
          TEHSIL: ${{ github.event.inputs.tehsil || 'जेवर' }}
          MAX_VILLAGES: ${{ github.event.inputs.max_villages || '12' }}
          START_VILLAGE: ${{ github.event.inputs.start_village || '0' }}
          INCLUDE_OWNERS: ${{ github.event.inputs.include_owners || '0' }}
        run: python tools/fetch_gbn_parcels.py
      - name: Commit data back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/gbn_parcels.geojson
          git commit -m "data: GBN/Jewar parcels (scaled, automated fetch)" || { echo "no changes"; exit 0; }
          git pull --rebase origin main || true
          git push
