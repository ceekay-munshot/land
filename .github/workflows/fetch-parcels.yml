name: fetch-parcels

# Pull real GBN/Jewar parcels from UP Bhu-Naksha (free US runner) and commit the
# combined GeoJSON back to main. Runs on a schedule (the "auto-batcher"): each run
# resumes where the last left off and adds the next batch of villages, until the
# whole tehsil is covered — then it harmlessly does nothing.
on:
  workflow_dispatch:
    inputs:
      tehsil:
        description: Tehsil (Hindi substring)
        default: जेवर
      max_villages:
        description: Max villages per run
        default: '15'
      include_owners:
        description: Include owner names (1=yes). Repo is public — keep 0 unless private.
        default: '0'
  # schedule PAUSED so the village set stays fixed while bhunaksha-trace fills 100%.
  # Re-enable (uncomment) once the trace has caught up, to discover more villages.
  # schedule:
  #   - cron: '17 */3 * * *'   # every 3 hours
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-parcels.yml'
      - 'tools/fetch_gbn_parcels.py'

permissions:
  contents: write

concurrency:
  group: parcels-batcher
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pyproj
      - name: Fetch next batch of GBN parcels
        env:
          TEHSIL: ${{ github.event.inputs.tehsil || 'जेवर' }}
          MAX_VILLAGES: ${{ github.event.inputs.max_villages || '15' }}
          INCLUDE_OWNERS: ${{ github.event.inputs.include_owners || '0' }}
          TIME_BUDGET: '1500'
          SLEEP: '0.06'
          APPEND: '1'
          TARGET_LATLNG: '28.1607,77.6100'   # grow coverage outward from Noida Int'l Airport (Jewar)
        run: python tools/fetch_gbn_parcels.py
      - name: Commit data back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/gbn_parcels.geojson
          git commit -m "data: GBN/Jewar parcels (auto-batcher)" || { echo "no changes"; exit 0; }
          git pull --rebase origin main || true
          git push
