name: nalgadha-fetch

# Pull the Nalgadha gata register (village नलगढ़ा / 120241, Gautam Buddh Nagar Sadar tehsil)
# from UP Bhu-Naksha: every gata + plot/khata/area + owner names (PUBLIC — founder's decision).
# Names go to web/data/nalgadha_owners.json (plaintext) for the public dashboard.
# Resumable; re-run to finish a large village.
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'   # grind to full village; counts public + names encrypted (needs NALGADHA_KEY secret)
  push:
    branches: [main]
    paths:
      - '.github/workflows/nalgadha-fetch.yml'

permissions:
  contents: write

concurrency:
  group: nalgadha-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pyproj
      - name: Fetch gata register + backfill owner names (plaintext, public)
        env:
          TEHSIL: 'गौतमबुद्धनगर'
          VILLAGE_CODE: '120241'
          ENUM_MAX: '400'
          OUT: 'web/data/nalgadha_parcels.geojson'
          OWNERS_IN: 'web/data/nalgadha_owners.json'
          OWNERS_OUT: 'web/data/nalgadha_owners.json'
          NAMES_BUDGET: '300'
          MAX_VILLAGES: '1'
          PER_VILLAGE_MAX_PLOTS: '3000'
          TIME_BUDGET: '900'
          SLEEP: '0.06'
          APPEND: '1'
          RESUME_SCAN: '1'
          REQ_TIMEOUT: '10'
        run: python tools/fetch_gbn_parcels.py
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -q --ignore-unmatch web/data/nalgadha_owners.json.enc
          git add web/data/nalgadha_parcels.geojson web/data/nalgadha_owners.json
          git commit -m "data: Nalgadha gata register + owner names (public)" || { echo "no change"; exit 0; }
          git pull --rebase origin main || true
          git push
