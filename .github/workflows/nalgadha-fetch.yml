name: nalgadha-fetch

# Pull the Nalgadha gata register (village नलगढ़ा / 120241, Gautam Buddh Nagar Sadar tehsil)
# from UP Bhu-Naksha: every gata + plot/khata/area + owner COUNT (public). Owner NAMES are
# collected separately and ENCRYPTED (NALGADHA_KEY secret) — kept OUT of the public geojson.
# Resumable; re-run to finish a large village. (NALGADHA_KEY set; level() retry-hardened.)
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'   # grind to full village; counts public + names encrypted (needs NALGADHA_KEY secret)
  push:
    branches: [main]
    paths:
      - '.github/workflows/nalgadha-fetch.yml'

permissions:
  contents: write

concurrency:
  group: nalgadha-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pyproj
      - name: Decrypt existing owner names (to resume the backfill)
        env:
          NALGADHA_KEY: ${{ secrets.NALGADHA_KEY }}
        run: |
          mkdir -p _tmp
          echo '{}' > _tmp/owners_old.json
          if [ -n "$NALGADHA_KEY" ] && [ -f web/data/nalgadha_owners.json.enc ]; then
            openssl enc -d -aes-256-cbc -pbkdf2 -in web/data/nalgadha_owners.json.enc \
              -out _tmp/owners_old.json -pass env:NALGADHA_KEY 2>/dev/null || echo '{}' > _tmp/owners_old.json
          fi
      - name: Fetch gata register + backfill owner names
        env:
          TEHSIL: 'गौतमबुद्धनगर'
          VILLAGE_CODE: '120241'
          OUT: 'web/data/nalgadha_parcels.geojson'
          OWNERS_IN: '_tmp/owners_old.json'
          OWNERS_OUT: '_tmp/owners_merged.json'
          NAMES_BUDGET: '700'
          MAX_VILLAGES: '1'
          PER_VILLAGE_MAX_PLOTS: '3000'
          TIME_BUDGET: '700'
          SLEEP: '0.06'
          APPEND: '1'
          RESUME_SCAN: '1'
          REQ_TIMEOUT: '10'
        run: python tools/fetch_gbn_parcels.py
      - name: Encrypt owner names (held back from the public geojson)
        env:
          NALGADHA_KEY: ${{ secrets.NALGADHA_KEY }}
        run: |
          if [ -z "$NALGADHA_KEY" ]; then echo "no key — names not stored"; exit 0; fi
          if [ ! -f _tmp/owners_merged.json ]; then echo "no names file produced"; exit 0; fi
          openssl enc -aes-256-cbc -pbkdf2 -salt -in _tmp/owners_merged.json \
            -out web/data/nalgadha_owners.json.enc -pass env:NALGADHA_KEY
          python3 -c "import json;print('encrypted owner-name records:', len(json.load(open('_tmp/owners_merged.json'))))"
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/nalgadha_parcels.geojson
          git add web/data/nalgadha_owners.json.enc 2>/dev/null || true
          git commit -m "data: Nalgadha gata register + encrypted owner names" || { echo "no change"; exit 0; }
          git pull --rebase origin main || true
          git push
