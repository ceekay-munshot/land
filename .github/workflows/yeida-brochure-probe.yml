name: yeida-brochure-probe

# One-off: can Firecrawl extract YEIDA brochure PDFs as text (reserve price by sector)?
# Dumps the result to _probe/ so we can decide whether to build sector-price extraction.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/yeida-brochure-probe.yml'
      - 'tools/probe_yeida_brochure.py'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Probe brochure PDF
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python tools/probe_yeida_brochure.py
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _probe
          git commit -m "probe: YEIDA brochure PDF extraction" || { echo "no change"; exit 0; }
          git pull --rebase origin main || true
          git push
