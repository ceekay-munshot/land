name: records-probe

# Feasibility: are IGRSUP (deeds) and Bhulekh (Khatauni/Girdawari) reachable from Actions and
# captcha-gated? Decides whether the deeds/EC/Girdawari layers are buildable or need Firecrawl.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/records-probe.yml'
      - 'tools/probe_records_sources.py'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python tools/probe_records_sources.py
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _probe/records_sources.json
          git commit -m "probe: IGRSUP/Bhulekh records-source feasibility" || { echo "no change"; exit 0; }
          git pull --rebase origin main || true
          git push
