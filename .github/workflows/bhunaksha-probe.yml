name: bhunaksha-probe

# Extract the geometry recipe (GeoServer base, layer name, /api paths) from the
# UP Bhu-Naksha Angular app bundle. Free, from a US runner.
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/bhunaksha-probe.yml'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Bhu-Naksha geometry recipe (main bundle)
        shell: bash
        run: |
          set +e
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36'
          BASE="https://upbhunaksha.gov.in"
          curl -sSL -k -m 60 -A "$UA" "$BASE/main-76RVRF3Z.js" -o /tmp/main.js -w 'main.js HTTP %{http_code}  bytes %{size_download}\n'

          echo "=== all /api/ paths ==="
          grep -oE '/api/[A-Za-z0-9_/.-]+' /tmp/main.js | sort -u | head -60

          echo ""
          echo "=== geoserver / wms / wfs / layer context ==="
          grep -oiE '.{0,30}(geoserver|/wms|/wfs|typename|layers=|workspace|getfeatureinfo|info_format)[^"]{0,70}' /tmp/main.js | sort -u | head -60

          echo ""
          echo "=== absolute http(s) urls in app bundle ==="
          grep -oE 'https?://[A-Za-z0-9._:/-]+' /tmp/main.js | sort -u | head -50

          echo ""
          echo "=== layer/workspace-looking tokens (word:word) ==="
          grep -oE '"[A-Za-z0-9_]+:[A-Za-z0-9_]+"' /tmp/main.js | sort -u | head -40

          echo ""
          echo "=== context around plot endpoints ==="
          grep -oiE '.{0,20}(api/plots|plotinfo|getplot|plot_no|plotno|kid|giscode)[^"]{0,50}' /tmp/main.js | sort -u | head -40
          echo done
