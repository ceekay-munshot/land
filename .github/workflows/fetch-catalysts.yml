name: fetch-catalysts

# Pull real catalyst geometry (airport + expressways) from OpenStreetMap and commit
# it back so the map shows real infrastructure + per-parcel distance-to-airport.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-catalysts.yml'
      - 'tools/fetch_catalysts_osm.py'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch OSM catalysts
        run: python tools/fetch_catalysts_osm.py
      - name: Commit data back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/catalysts_osm.geojson
          git commit -m "data: real catalyst geometry from OSM (airport, expressways)" || { echo "no changes"; exit 0; }
          git pull --rebase origin main || true
          git push
