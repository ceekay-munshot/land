name: igrsup-probe

# Reverse-engineer IGRSUP deed-search (district/tehsil/village/khasra -> registered deeds)
# so we can pull per-gata transfer history for Nalgadha.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/igrsup-probe.yml'
      - 'tools/probe_igrsup_deedsearch.py'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python tools/probe_igrsup_deedsearch.py
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _probe/igrsup_deedsearch.json
          git commit -m "probe: IGRSUP deed-search reverse-engineering" || { echo "no change"; exit 0; }
          git pull --rebase origin main || true
          git push
