name: bhunaksha-vector

# Fetch REAL parcel polygons via the direct vector endpoint
# (mapModificationController/getGeoJSONLayerData) — see docs/bhunaksha_api.md.
# Runs on a GitHub runner (open egress to upbhunaksha.gov.in).
#
#   MODE=validate : probe one village, commit _probe/bhunaksha_vector_live.json,
#                   write NO map data. This is what a push runs (safe).
#   MODE=fetch    : auto-discover the combo, fetch villages, write web/data.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'wms (find boundary render) | token | validate | fetch'
        type: choice
        options: [wms, token, validate, fetch]
        default: validate
      gis:
        description: 'validate: village giscode to probe'
        type: string
        default: '14100743120241'
      district:
        description: 'fetch: district name match (Devanagari)'
        type: string
        default: 'गौतम'
      tehsil:
        description: 'fetch: tehsil name match (Devanagari)'
        type: string
        default: 'जेवर'
      out:
        description: 'fetch: output GeoJSON'
        type: string
        default: 'web/data/gbn_parcels_vector.geojson'
      max_villages:
        description: 'fetch: cap villages per run (resume-friendly)'
        type: string
        default: '60'
  push:
    branches: [main]
    paths:
      - '.github/workflows/bhunaksha-vector.yml'
      - 'tools/fetch_bhunaksha_vector.py'

permissions:
  contents: write

concurrency:
  group: bhunaksha-vector
  cancel-in-progress: false

jobs:
  vector:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests pyproj
      - name: Run vector fetch/validate
        env:
          MODE: ${{ github.event.inputs.mode || 'wms' }}
          GIS: ${{ github.event.inputs.gis || '14100743120241' }}
          DISTRICT: ${{ github.event.inputs.district || 'गौतम' }}
          TEHSIL: ${{ github.event.inputs.tehsil || 'जेवर' }}
          OUT: ${{ github.event.inputs.out || 'web/data/gbn_parcels_vector.geojson' }}
          MAX_VILLAGES: ${{ github.event.inputs.max_villages || '60' }}
        run: python tools/fetch_bhunaksha_vector.py
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _probe/bhunaksha_vector_live.json web/data/*.geojson 2>/dev/null || true
          git commit -m "data: Bhu-Naksha vector ${{ github.event.inputs.mode || 'validate' }} (real polygons via getGeoJSONLayerData)" || { echo "no change"; exit 0; }
          git pull --rebase origin main || true
          git push
