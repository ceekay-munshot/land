name: bhunaksha-geom-probe

# Find how Bhu-Naksha serves the real plot polygon (vs the bbox we draw now).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bhunaksha-geom-probe.yml'
      - 'tools/probe_bhunaksha_geom.py'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python tools/probe_bhunaksha_geom.py
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _probe/bhunaksha_geom.json
          git commit -m "probe: Bhu-Naksha real-geometry endpoint" || { echo "no change"; exit 0; }
          git pull --rebase origin main || true
          git push
