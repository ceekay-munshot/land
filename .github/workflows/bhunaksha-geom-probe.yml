name: bhunaksha-geom-probe

# Find how Bhu-Naksha serves the real plot polygon (vs the bbox we draw now).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bhunaksha-geom-probe.yml'
      - 'tools/probe_bhunaksha_geom.py'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python tools/probe_bhunaksha_geom.py || echo "geom probe failed (non-fatal)"
      - run: python tools/probe_bhunaksha_frontend.py
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A _probe/
          git commit -m "probe: Bhu-Naksha frontend deep-extract (geometry endpoint + layercodes)" || { echo "no change"; exit 0; }
          # dispatched against a feature ref -> push results back to that same branch
          git push origin "HEAD:${GITHUB_REF_NAME}"
