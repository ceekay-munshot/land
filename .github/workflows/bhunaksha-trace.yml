name: bhunaksha-trace

# Public raster->vector: GetMap the VILLAGE_MAP cadastre (renders anonymously)
# and trace it into real tessellating polygons (cadastre_core). Validated path —
# see docs/bhunaksha_api.md. Operates IN PLACE on the app's parcel files: every
# plot is kept (unmatched -> bbox_fallback), traced plots get real polygons.
#
# Resumable + bounded: each run does <= MAX_VILLAGES new villages per file and
# skips ones already traced, so the schedule fills GBN (21 villages) over a few
# runs without hitting the job timeout. Push kicks off the first batch.
on:
  workflow_dispatch:
    inputs:
      files:
        description: 'Space-separated parcel files to fill'
        type: string
        default: 'web/data/gbn_parcels.geojson web/data/nalgadha_parcels.geojson'
      max_villages:
        description: 'Max new villages per file per run'
        type: string
        default: '3'
      mpp:
        description: 'Metres/pixel (smaller = sharper + slower)'
        type: string
        default: '0.3'
  schedule:
    - cron: '*/20 * * * *'          # continue filling until every village is traced
  push:
    branches: [main]
    paths:
      - '.github/workflows/bhunaksha-trace.yml'
      - 'tools/fetch_bhunaksha_geom.py'
      - 'tools/cadastre_core.py'

permissions:
  contents: write

concurrency:
  group: bhunaksha-trace
  cancel-in-progress: false

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests pyproj numpy opencv-python-headless scikit-image shapely
      - name: Self-test the vectorizer (offline gate)
        run: python tools/selftest_geom.py
      - name: Trace real polygons (VILLAGE_MAP raster -> vector, resumable)
        env:
          GEOM_LAYERS: 'VILLAGE_MAP'
          WMS_PATH: 'WMS/tile'
          WMS_STYLES: 'VILLAGE_MAP'
          MPP: ${{ github.event.inputs.mpp || '0.3' }}
          TILE_PX: '2048'
          MAX_VILLAGES: ${{ github.event.inputs.max_villages || '3' }}
          TIME_BUDGET: '1100'
          FILES: ${{ github.event.inputs.files || 'web/data/gbn_parcels.geojson web/data/nalgadha_parcels.geojson' }}
        run: |
          for f in $FILES; do
            echo "===== tracing $f ====="
            OUT="$f" python tools/fetch_bhunaksha_geom.py || echo "trace failed for $f"
            IN="$f" python tools/add_cidx.py || echo "cidx failed for $f"
          done
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/*.geojson
          git commit -m "data: real parcel polygons (VILLAGE_MAP raster->vector, batch)" || { echo "no change"; exit 0; }
          # Robust against concurrent bbox-batchers pushing to main: fetch+merge
          # (our traced geometry wins on conflict) then push, retrying on rejection,
          # so a 25-min trace is never lost to a push race.
          ok=0
          for i in 1 2 3 4 5 6 7 8; do
            git fetch origin main || { sleep $((i*3)); continue; }
            git merge -X ours --no-edit origin/main || { git merge --abort 2>/dev/null || true; sleep $((i*3)); continue; }
            if git push origin HEAD:main; then ok=1; break; fi
            echo "push rejected, retry $i"; sleep $((i*3))
          done
          [ "$ok" = 1 ] || { echo "FAILED to push after retries"; exit 1; }
