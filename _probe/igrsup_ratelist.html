 //Prevents backspace except in the case of textareas and text inputs to prevent user navigation.
    $(document).keydown(function (e) {
        var preventKeyPress;
        if (e.keyCode == 8) {
            var d = e.srcElement || e.target;
            switch (d.tagName.toUpperCase()) {
                case 'TEXTAREA':
                    preventKeyPress = d.readOnly || d.disabled;
                    break;
                case 'INPUT':
                    preventKeyPress = d.readOnly || d.disabled ||
                        (d.attributes["type"] && $.inArray(d.attributes["type"].value.toLowerCase(), ["radio", "checkbox", "submit", "button"]) >= 0);
                    break;
                case 'DIV':
                    preventKeyPress = d.readOnly || d.disabled || !(d.attributes["contentEditable"] && d.attributes["contentEditable"].value == "true");
                    break;
                default:
                    preventKeyPress = true;
                    break;
            }
        }
        else
            preventKeyPress = false;

        if (preventKeyPress)
            e.preventDefault();
    });

    function checkForHindiWithDigitCharacters(element)
    {
    	var str = element.value;
    	var i = str.length;
    	while (i--) {
    	  var charCode = str[i].charCodeAt(0);
    	  if ((charCode >= 33 && charCode <= 44) ||(charCode >= 48 && (charCode > 57 && charCode<=127))  || (charCode >= 58 && charCode <= 122) )
    		  {
    		  element.value="";
    		  element.focus();
    		 
    		  }
    	  
    	}
    }


    function checkForDigitsOnly(element)
    {
    	var str = element.value;
    	var i = str.length;
    	while (i--) {
    	  var charCode = str[i].charCodeAt(0);
    	  if ((charCode >= 48 && charCode > 57))
    		  {
    		  element.value="";
    		  element.focus();
    		 
    		  }
    	  
    	}
    	
    }

    function checkForHindiCharacters(element)
    {
    	var str = element.value;

    		  element.focus();
    		  
    		  }
    	 
    	}

<script type="text/javascript">
var pager = new Pager('tablepaging', 10);
var pagerbottom = new Pager('tablepaging', 10);

pagerbottom.init();
pager.showPageNav('pager', 'pageNavPosition');
pager.showPage(1);




function Pager(tableName, itemsPerPage) {

	  this.tableName = tableName;

	  this.itemsPerPage = itemsPerPage;

	  this.currentPage = 1;

	  this.pages = 0;

	  this.inited = false;

	  this.showRecords = function(from, to) {

	  var rows = document.getElementById(tableName).rows;

	  // i starts from 1 to skip table header row

	  for (var i = 2; i < rows.length; i++) {

	  if (i < from || i > to)

	  rows[i].style.display = 'none';

	  else

	  rows[i].style.display = '';

	  }

	  }

	  this.showPage = function(pageNumber) {

	  if (! this.inited) {

	  alert("not inited");

	  return;

	  }

	  var oldPageAnchor = document.getElementById('pg'+this.currentPage);

	  oldPageAnchor.className = 'pg-normal';

	  this.currentPage = pageNumber;

	  var newPageAnchor = document.getElementById('pg'+this.currentPage);

	  newPageAnchor.className = 'pg-selected';

	  var from = (pageNumber - 1) * itemsPerPage + 1;

	  var to = from + itemsPerPage - 1;

	  this.showRecords(from, to);

	  }

	  this.prev = function() {

	  if (this.currentPage > 1)

	  this.showPage(this.currentPage - 1);

	  }

	  this.next = function() {

	  if (this.currentPage < this.pages) {

	  this.showPage(this.currentPage + 1);

	  }

	  }

	  this.init = function() {

	  var rows = document.getElementById(tableName).rows;

	  var records = (rows.length - 1);

	  this.pages = Math.ceil(records / itemsPerPage);

	  this.inited = true;

	  }

	  this.showPageNav = function(pagerName, positionId) {

	  if (! this.inited) {

	  alert("not inited");

	  return;

	  }

	  var element = document.getElementById(positionId);

	  var pagerHtml = '<span onclick="' + pagerName + '.prev();" class="pg-normal"> </span> ';

	  for (var page = 1; page <= this.pages; page++)

	  pagerHtml += '<span id="pg' + page + '" class="pg-normal" onclick="' + pagerName + '.showPage(' + page + ');">' + page + '</span> ';

	  pagerHtml += '<span onclick="'+pagerName+'.next();" class="pg-normal"></span>';

	  element.innerHTML = pagerHtml;

	  }

	  }
</script>
