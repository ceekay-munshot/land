<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LAND — NCR Land Intelligence (Phase 0)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link href="./style.css" rel="stylesheet" />
</head>
<body>
  <div id="map"></div>

  <div id="title">
    <h1>🏗️ LAND<span>· NCR Land Intelligence</span></h1>
    <div class="phase">Phase 4 · Gautam Buddh Nagar · <b>live parcel scoring</b></div>
  </div>

  <div id="controls">
    <button id="btn-india">🇮🇳 India view</button>
    <button id="btn-gbn">🔍 Zoom to Gautam Buddh Nagar</button>
    <button id="btn-parcels" style="display:none">🟣 Live parcels</button>
  </div>

  <div id="legend">
    <div class="legend-title">Growth score <span>(parcels)</span></div>
    <div class="row"><span class="sw green"></span> High · 🟢 67–100</div>
    <div class="row"><span class="sw orange"></span> Medium · 🟠 40–66</div>
    <div class="row"><span class="sw red"></span> Low · 🔴 0–39</div>
    <hr />
    <div class="row"><span class="dot"></span> ✈ airport · 🛣 expressways</div>
    <div class="disclaimer">Parcel colours = real heuristic score (airport proximity + price headroom). Faint tehsil fills are a coarse placeholder.</div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
